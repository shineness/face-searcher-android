name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2
          
      - name: Build debug APK
        run: |
          cd face-searcher-android
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: face-searcher-debug.apk
          path: face-searcher-android/app/build/outputs/apk/debug/app-debug.apk
          
      - name: Upload APK to release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: face-searcher-android/app/build/outputs/apk/debug/app-debug.apk
          body: 'Auto-built debug APK'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
